spring:
  application:
    name: stock-service
  datasource:
    url: jdbc:postgresql://${STOCK_DB_HOST:localhost}:${STOCK_DB_PORT:5432}/${STOCK_DB_NAME:stockdb}
    username: ${STOCK_DB_USERNAME:stocklens}
    password: ${STOCK_DB_PASSWORD:stocklens}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${STOCK_SERVICE_PORT:8081}

app:
  news-service-url: ${NEWS_SERVICE_URL:http://localhost:8082}
  market-data:
    alpha-base-url: https://www.alphavantage.co
    alpha-api-key: ${ALPHAVANTAGE_API_KEY:}
    alpha-cache-ttl-seconds: ${ALPHA_CACHE_TTL_SECONDS:300}

logging:
  level:
    org.hibernate.SQL: INFO

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,mappings
