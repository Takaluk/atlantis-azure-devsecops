spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${AUTH_DB_HOST:localhost}:${AUTH_DB_PORT:5434}/${AUTH_DB_NAME:authdb}
    username: ${AUTH_DB_USERNAME:stocklens}
    password: ${AUTH_DB_PASSWORD:stocklens}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${AUTH_REDIS_HOST:localhost}
      port: ${AUTH_REDIS_PORT:6379}

server:
  port: ${AUTH_SERVICE_PORT:8083}

app:
  demo-user-email: ${APP_DEMO_USER_EMAIL:demo@stocklens.local}
  demo-user-password: ${APP_DEMO_USER_PASSWORD:demo1234}
  jwt:
    secret: ${APP_JWT_SECRET:stocklens-demo-jwt-secret-please-change-at-least-32-bytes}
    access-token-ttl-minutes: ${APP_JWT_ACCESS_TOKEN_TTL_MINUTES:60}

logging:
  level:
    org.hibernate.SQL: INFO

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,mappings
