<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Stock Lens - Home</title>
  <style>

    :root{
      --bg:#0b0f14;
      --card:#121826;
      --card2:#0f1522;
      --text:#e8eefc;
      --muted:#9aa7bd;
      --line:#24314a;
      --chip:#1a2336;
      --chip2:#172033;
      --good:#2dd4bf;
      --bad:#fb7185;
      --warn:#fbbf24;
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", Segoe UI, Roboto, Helvetica, Arial;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    a{color:inherit; text-decoration:none}
    .app{
      max-width:480px;
      margin:0 auto;
      padding: calc(12px + env(safe-area-inset-top)) 14px calc(18px + env(safe-area-inset-bottom) + 70px);
    }

    /* Topbar */
    .topbar{
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 10px 0 12px;
      background: linear-gradient(to bottom, rgba(11,15,20,0.98), rgba(11,15,20,0.86), rgba(11,15,20,0));
      backdrop-filter: blur(6px);
    }
    .row{display:flex; align-items:center; justify-content:space-between; gap:10px}
    .brand{display:flex; flex-direction:column; gap:2px;}
    .title{font-size:16px; font-weight:850; letter-spacing:-0.2px;}
    .sub{font-size:12px; color:var(--muted);}
    .badge{
      font-size:12px;
      color:var(--muted);
      padding:8px 10px;
      border:1px solid var(--line);
      background: rgba(18,24,38,0.6);
      border-radius:999px;
      white-space:nowrap;
    }

    /* Cards */
    .card{
      background: linear-gradient(180deg, rgba(18,24,38,0.96), rgba(18,24,38,0.86));
      border: 1px solid rgba(36,49,74,0.7);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
    }
    .card + .card{ margin-top: 10px; }
    .sectionTitle{
      font-size:13px;
      font-weight:850;
      margin: 2px 2px 10px;
      letter-spacing:-0.2px;
    }

    /* Search */
    .searchWrap{display:flex; flex-direction:column; gap:10px;}
    .searchBox{
      display:flex; align-items:center; gap:10px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid rgba(36,49,74,0.75);
      background: rgba(15,21,34,0.55);
    }
    .searchIcon{width:18px; height:18px; flex:0 0 auto; opacity:0.9;}
    .searchInput{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:14px;
    }
    .searchInput::placeholder{ color: rgba(154,167,189,0.8); }
    .clearBtn{
      border:1px solid rgba(36,49,74,0.8);
      background: rgba(18,24,38,0.55);
      color: var(--muted);
      border-radius: 12px;
      padding: 7px 9px;
      font-size: 12px;
      cursor:pointer;
    }
    .clearBtn:active{ transform: scale(0.98); }

    /* Chips */
    .chipRow{
      display:flex;
      gap:8px;
      overflow:auto;
      padding: 2px 2px 0;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
    }
    .chipRow::-webkit-scrollbar{display:none}
    .chip{
      flex:0 0 auto;
      background: var(--chip);
      border: 1px solid rgba(36,49,74,0.7);
      color: var(--text);
      font-size:12px;
      padding: 9px 10px;
      border-radius: 999px;
      cursor:pointer;
      white-space:nowrap;
      scroll-snap-align: start;
      user-select:none;
      transition: transform .06s ease;
    }
    .chip:active{ transform: scale(0.98); }
    .chip.secondary{ background: var(--chip2); color: var(--muted); }
    .chip.selected{
      border-color: rgba(45,212,191,0.85);
      box-shadow: 0 0 0 3px rgba(45,212,191,0.14);
    }

    /* List */
    .list{display:flex; flex-direction:column; gap:10px;}
    .item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding: 12px;
      border-radius: 16px;
      border:1px solid rgba(36,49,74,0.65);
      background: rgba(15,21,34,0.55);
      cursor:pointer;
      transition: transform .06s ease;
    }
    .item:active{ transform: scale(0.99); }
    .left{display:flex; flex-direction:column; gap:3px; min-width:0;}
    .symRow{display:flex; align-items:center; gap:8px; min-width:0;}
    .sym{font-size:13px; font-weight:900; letter-spacing:-0.1px;}
    .name{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: 220px;
    }
    .tag{
      font-size:10px;
      padding: 5px 7px;
      border-radius: 999px;
      border: 1px solid rgba(36,49,74,0.7);
      color: var(--muted);
      background: rgba(18,24,38,0.55);
      flex:0 0 auto;
    }
    .right{display:flex; align-items:center; gap:12px; flex: 0 0 auto;}
    .px{display:flex; flex-direction:column; align-items:flex-end; gap:3px;}
    .price{font-size:13px; font-weight:850; letter-spacing:-0.1px;}
    .chg{font-size:12px; font-weight:800;}
    .chg.good{ color: var(--good); }
    .chg.bad{ color: var(--bad); }
    .chg.neutral{ color: var(--warn); }

    .spark{width: 72px; height: 26px; opacity: 0.95; flex: 0 0 auto;}
    .spark path{fill:none; stroke: rgba(232,238,252,0.85); stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}
    .spark .fill{fill: rgba(154,167,189,0.10); stroke: none;}

    .muted{ color: var(--muted); }

    .empty{
      padding: 12px;
      border-radius: 16px;
      border: 1px dashed rgba(36,49,74,0.75);
      background: rgba(18,24,38,0.35);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    /* Bottom nav */
    .bottomNav{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(10px + env(safe-area-inset-bottom));
      width: min(480px, calc(100vw - 24px));
      background: rgba(18,24,38,0.78);
      border: 1px solid rgba(36,49,74,0.7);
      border-radius: 18px;
      backdrop-filter: blur(8px);
      display:flex;
      justify-content:space-between;
      padding: 10px 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .navBtn{
      flex:1 1 0;
      display:flex; align-items:center; justify-content:center; gap:8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      padding: 9px 10px;
      border-radius: 14px;
      cursor:pointer;
      user-select:none;
    }
    .navBtn.active{
      color: var(--text);
      border: 1px solid rgba(45,212,191,0.55);
      background: rgba(45,212,191,0.10);
    }

    /* Articles */
    .articleItem{
      display:flex; gap:10px; align-items:flex-start;
      padding:10px;
      border-radius: 14px;
      border:1px solid rgba(36,49,74,0.65);
      background: rgba(15,21,34,0.55);
    }
    .dot{
      width:8px; height:8px; border-radius:999px;
      background: rgba(154,167,189,0.7);
      margin-top:6px; flex:0 0 auto;
    }
    .aText{display:flex; flex-direction:column; gap:2px;}
    .aTitle{font-size:12px; font-weight:800; letter-spacing:-0.1px}
    .aMeta{font-size:11px; color:var(--muted)}
    .aDesc{font-size:12px; color:var(--text); line-height:1.5; margin-top:4px}

    /* Small button */
    .btn{
      border:1px solid rgba(36,49,74,0.8);
      background: rgba(15,21,34,0.6);
      color: var(--text);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 850;
      cursor:pointer;
      user-select:none;
    }
    .btn:active{ transform: scale(0.98); }
    .btn.primary{
      border-color: rgba(45,212,191,0.65);
      background: rgba(45,212,191,0.12);
    }
    .btn.ghost{
      color: var(--muted);
      background: rgba(18,24,38,0.35);
    }

    /* keyword concept dialog */
    dialog{
      width: min(480px, calc(100vw - 18px));
      border: 1px solid rgba(36,49,74,0.8);
      border-radius: 18px;
      background: rgba(18,24,38,0.96);
      color: var(--text);
      padding: 0;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    dialog::backdrop{
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(3px);
    }
    .sheet{ padding: 14px; }
    .sheetTop{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom: 8px; }
    .sheetTitle{ font-weight:900; font-size:14px; letter-spacing:-0.2px; }
    .sheetBody{ font-size:13px; line-height: 1.6; color: var(--text); }
    .sheetHint{ margin-top:10px; font-size:11px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="row">
        <div class="brand">
          <div class="title">Stock Lens</div>
          <div class="sub">모든 종목 오늘의 키워드/뉴스를 빠르게 훑기</div>
        </div>
        <div class="badge" id="marketBadge">US · -</div>
      </div>
    </div>

    <!-- Key Keywords -->
    <div class="card">
      <div class="row" style="margin-bottom:8px">
        <div class="sectionTitle" style="margin:0">주요 키워드</div>
        <div class="badge">설명 보기</div>
      </div>
      <div class="chipRow" id="keywordChips" aria-label="주요 키워드"></div>
      <div class="empty" style="margin-top:10px">
        * 키워드를 누르면 간단한 “개념 설명”을 보여줍니다.<br/>
        실제 서비스에서는 관련 기사/대표 기업/관련 지표 링크까지 확장
      </div>
    </div>

    <!-- Major Articles -->
    <div class="card">
      <div class="sectionTitle">주요 기사</div>
      <div class="list" id="articleList"></div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottomNav" role="navigation" aria-label="하단 메뉴">
    <div class="navBtn active" id="navHome">🏠 홈</div>
    <div class="navBtn" id="navSearch">🔎 검색</div>
    <div class="navBtn" id="navWatch">⭐ 관심</div>
    <div class="navBtn" id="navLogin">🔑 로그인</div>
  </div>

  <!-- Keyword concept bottom-sheet -->
  <dialog id="conceptDialog">
    <div class="sheet">
      <div class="sheetTop">
        <div>
          <div class="sheetTitle" id="conceptTitle">키워드</div>
          <div class="sub" id="conceptSubtitle">가벼운 개념 설명</div>
        </div>
        <button class="btn" id="conceptCloseBtn" type="button">닫기</button>
      </div>
      <div class="sheetBody" id="conceptBody"></div>
      <div class="sheetHint">실제 서비스에서는 관련 지표/대표 기업/추가 읽을거리 추가</div>
    </div>
  </dialog>

  <script>
    const $ = (s) => document.querySelector(s);
    const $$ = (s) => Array.from(document.querySelectorAll(s));

    function pctClass(v){
      if (v >= 0.25) return "good";
      if (v <= -0.25) return "bad";
      return "neutral";
    }
    function fmtChg(v){
      const sign = v > 0 ? "+" : (v < 0 ? "" : "");
      return `${sign}${v.toFixed(1)}%`;
    }
    function sparkPath(points, w=72, h=26, pad=2){
      const min = Math.min(...points);
      const max = Math.max(...points);
      const span = Math.max(1e-6, max - min);
      const step = (w - pad*2) / (points.length - 1);

      const xy = points.map((p,i) => {
        const x = pad + i*step;
        const y = pad + (1 - (p - min)/span) * (h - pad*2);
        return [x,y];
      });

      const d = xy.map(([x,y],i) => (i===0 ? `M ${x.toFixed(2)} ${y.toFixed(2)}` : `L ${x.toFixed(2)} ${y.toFixed(2)}`)).join(" ");
      const fillD = `${d} L ${(w-pad).toFixed(2)} ${(h-pad).toFixed(2)} L ${pad.toFixed(2)} ${(h-pad).toFixed(2)} Z`;
      return { d, fillD };
    }
    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, (m) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }
    function openStock(sym){
      location.href = `/stock?t=${encodeURIComponent(sym)}`;
    }
    function renderItem(t){
      const el = document.createElement("div");
      el.className = "item";
      el.setAttribute("role","button");
      el.tabIndex = 0;

      const { d, fillD } = sparkPath(t.spark);
      const chgCls = pctClass(t.chg);

      el.innerHTML = `
        <div class="left">
          <div class="symRow">
            <div class="sym">${escapeHtml(t.sym)}</div>
            <div class="tag">${escapeHtml(t.tag)} · ${escapeHtml(t.market)}</div>
          </div>
          <div class="name">${escapeHtml(t.name)}</div>
        </div>
        <div class="right">
          <svg class="spark" viewBox="0 0 72 26" aria-hidden="true">
            <path class="fill" d="${fillD}"></path>
            <path d="${d}"></path>
          </svg>
          <div class="px">
            <div class="price">${escapeHtml(t.price)}</div>
            <div class="chg ${chgCls}">${escapeHtml(fmtChg(t.chg))}</div>
          </div>
        </div>
      `;
      el.addEventListener("click", () => openStock(t.sym));
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") openStock(t.sym);
      });
      return el;
    }

    // ====== Login ======
    function getToken(){
      return localStorage.getItem("access_token");
    }
    function setToken(token){
      if (token) {
        localStorage.setItem("access_token", token);
      } else {
        localStorage.removeItem("access_token");
      }
    }
    function isLoggedIn(){
      return !!getToken();
    }
    function authHeaders(){
      const token = getToken();
      return token ? { Authorization: `Bearer ${token}` } : {};
    }
    async function loginFlow(){
      const email = prompt("이메일", "demo@stocklens.local");
      if (!email) return;
      const password = prompt("비밀번호", "demo1234");
      if (!password) return;
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      if (!res.ok) throw new Error("로그인 실패: " + res.status);
      const data = await res.json();
      setToken(data.accessToken);
      alert("로그인");
    }
    async function logoutFlow(){
      const token = getToken();
      if (!token) return;
      const res = await fetch("/api/auth/logout", {
        method: "POST",
        headers: authHeaders()
      });
      if (!res.ok) throw new Error("로그아웃 실패: " + res.status);
      setToken(null);
      alert("로그아웃");
    }
    function updateLoginLabel(){
      const el = $("#navLogin");
      if (!el) return;
      el.textContent = isLoggedIn() ? "🚪 로그아웃" : "🔑 로그인";
    }

    // ====== Bottom Nav ======
    function bindNav(active){
      const go = (p) => location.href = p;

      $("#navHome")?.addEventListener("click", () => go("/home"));
      $("#navSearch")?.addEventListener("click", () => go("/search"));
      $("#navWatch")?.addEventListener("click", () => go("/watch"));
      $("#navLogin")?.addEventListener("click", async () => {
        try {
          if (isLoggedIn()){
            await logoutFlow();
          } else {
            await loginFlow();
          }
        } catch (err) {
          alert(err?.message ?? "요청 실패");
        }
        updateLoginLabel();
      });

      // active state
      const map = {home:"navHome", search:"navSearch", watch:"navWatch", login:"navLogin"};
      Object.values(map).forEach(id => $("#"+id)?.classList.remove("active"));
      const actId = map[active];
      if (actId) $("#"+actId)?.classList.add("active");

      updateLoginLabel();
    }

    function setTodayBadge(){
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth()+1).padStart(2,"0");
      const dd = String(today.getDate()).padStart(2,"0");
      $("#marketBadge") && ($("#marketBadge").textContent = `US · ${yyyy}-${mm}-${dd}`);
    }




    const dialog = document.getElementById("conceptDialog");
    document.getElementById("conceptCloseBtn").addEventListener("click", () => dialog.close());
    dialog.addEventListener("click", (e) => {
      const rect = dialog.getBoundingClientRect();
      const inDialog = rect.top <= e.clientY && e.clientY <= rect.bottom && rect.left <= e.clientX && e.clientX <= rect.right;
      if (!inDialog) dialog.close();
    });

    let homeState = { concepts: {}, keywords: [], articles: [] };

    async function loadHomeFromApi(){
      const res = await fetch("/api/home");
      if (!res.ok) throw new Error("GET /api/home failed: " + res.status);
      const data = await res.json();

      // data: { keywords:[{word,description}], articles:[{title,meta,description,publishedAt}] }
      homeState.keywords = data.keywords ?? [];
      homeState.articles = data.articles ?? [];
      homeState.concepts = Object.fromEntries(homeState.keywords.map(k => [k.word, k.description]));
    }

    function openConcept(keyword){
      document.getElementById("conceptTitle").textContent = keyword;
      document.getElementById("conceptBody").textContent =
              homeState.concepts[keyword] ?? "설명 데이터가 없습니다.";
      document.getElementById("conceptDialog").showModal();
    }

    function renderKeywordChips(){
      const wrap = document.getElementById("keywordChips");
      wrap.innerHTML = "";
      homeState.keywords.forEach(k => {
        const b = document.createElement("button");
        b.className = "chip";
        b.type = "button";
        b.textContent = k.word;
        b.addEventListener("click", () => openConcept(k.word));
        wrap.appendChild(b);
      });
    }

    function renderArticles(){
      const list = document.getElementById("articleList");
      list.innerHTML = "";
      homeState.articles.forEach(a => {
        const el = document.createElement("div");
        el.className = "articleItem";
        el.innerHTML = `
        <span class="dot"></span>
        <span class="aText">
          <span class="aTitle">${escapeHtml(a.title)}</span>
          <span class="aMeta">${escapeHtml(a.meta)} · ${escapeHtml(a.publishedAt ?? "")}</span>
          <span class="aDesc">${escapeHtml(a.description ?? "")}</span>
        </span>
      `;
        list.appendChild(el);
      });
    }

    async function initHome(){
      setTodayBadge();
      bindNav("home");
      await loadHomeFromApi();
      renderKeywordChips();
      renderArticles();
    }

    initHome().catch(err => {
      console.error(err);
      alert("Home 데이터 로드 실패. 콘솔 확인");
    });
  </script>
</body>
</html>
